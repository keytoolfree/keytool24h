    <script>
        const _go = (x) => window.location.href = window.location.origin + (atob(x).startsWith('/') ? atob(x) : '/' + atob(x));

        const userKeyType = "<?php echo $user_key_type; ?>";
        const isLoggedIn = <?php echo $is_logged_in ? 'true' : 'false'; ?>;

        function checkToolAccess(link, isVipTool) {
            if (!isLoggedIn) { alert("Bạn cần đăng nhập!"); return; }
            if (isVipTool && userKeyType !== "Vip") { alert("Chỉ dành cho VIP!"); }
            else if (userKeyType === "Thành viên") { alert("Vui lòng nhập Key!"); }
            else { window.location.href = link; }
        }

        // --- ĐÃ SỬA: Đếm ngược thời gian thực dựa trên mốc hết hạn cố định ---
        // Lấy thời gian hiện tại của trình duyệt và tính toán sai lệch so với Server
        const serverExpiry = <?php echo $expiry_timestamp; ?> * 1000;
        
        function updateTimer() {
            const display = document.getElementById('main_timer');
            if(!display) return;
            
            const now = Date.now();
            const diff = Math.floor((serverExpiry - now) / 1000);

            if(diff <= 0) {
                display.innerHTML = "00:00:00";
                return;
            }
            
            let h = Math.floor(diff / 3600);
            let m = Math.floor((diff % 3600) / 60);
            let s = diff % 60;
            
            display.innerHTML = (h<10?'0':'')+h + ":" + (m<10?'0':'')+m + ":" + (s<10?'0':'')+s;
        }

        // Khởi chạy đếm ngược nếu có thời gian hết hạn
        if(serverExpiry > 0) { 
            setInterval(updateTimer, 1000); 
            updateTimer(); 
        }

        if (window.history.replaceState) { 
            window.history.replaceState(null, null, window.location.pathname); 
        }
        setTimeout(() => {
            const alertBox = document.getElementById('status-alert');
            if(alertBox) {
                alertBox.style.transition = "opacity 0.5s ease";
                alertBox.style.opacity = "0";
                setTimeout(() => alertBox.style.display = "none", 500);
            }
        }, 3000);

        function toggleMenu(e) { e.stopPropagation(); document.getElementById('menu-content').classList.toggle('show'); }
        function toggleNL(id) { const x = document.getElementById(id); x.style.display = (x.style.display === 'block') ? 'none' : 'block'; }
        
        let lastScroll = 0;
        const header = document.getElementById("main-header");
        window.addEventListener("scroll", () => {
            const currentScroll = window.pageYOffset;
            const menu = document.getElementById('menu-content');
            if (menu.classList.contains('show')) menu.classList.remove('show');
            if (Math.abs(currentScroll - lastScroll) > 5) {
                if (currentScroll > lastScroll && currentScroll > 60) { header.classList.add("header-hidden"); } 
                else if (currentScroll < lastScroll) { header.classList.remove("header-hidden"); }
                lastScroll = currentScroll;
            }
        }, { passive: true });

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('menu-content');
            if (menu && !menu.contains(e.target) && !document.getElementById('menu-btn').contains(e.target)) { menu.classList.remove('show'); }
        });
    </script>
