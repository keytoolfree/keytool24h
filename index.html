<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0;
        }

        /* KHUNG VIỀN RGB CHẠY GẮT */
        .neon-border {
            position: relative;
            padding: 2px;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 300% 300%;
            animation: move-border 1s linear infinite;
            border-radius: 4px;
        }

        @keyframes move-border {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .terminal-box {
            background: #000;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            position: relative;
            border-radius: 2px;
        }

        /* HIỆU ỨNG SCANNER */
        .scanner {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.5);
            position: absolute;
            top: 0; left: 0;
            animation: scan 3s linear infinite;
            box-shadow: 0 0 15px #00ff41;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .key-area {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #00ff41;
            padding: 20px;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff41;
            position: relative;
            overflow: hidden;
        }

        .btn-access {
            background: #00ff41;
            color: #000;
            font-weight: 800;
            padding: 15px;
            width: 100%;
            text-transform: uppercase;
            transition: 0.2s;
            clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
        }

        .btn-access:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        .contact-item {
            border-left: 2px solid #333;
            padding-left: 15px;
            transition: 0.3s;
        }

        .contact-item:hover {
            border-left: 2px solid #00ff41;
            background: rgba(0, 255, 65, 0.05);
        }
    </style>
</head>
<body>

    <div class="neon-border">
        <div class="terminal-box">
            <div class="scanner"></div>
            
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-bold">[ SYSTEM STATUS: ONLINE ]</span>
                <span class="text-[10px] animate-pulse">● REC</span>
            </div>

            <h1 class="text-xl font-black mb-6 uppercase tracking-[5px]">Get Key Access</h1>
            
            <div id="display" class="key-area mb-8 text-center">
                ROOT@SEARCHING...
            </div>

            <button onclick="copyAndDestroy()" class="btn-access mb-8">
                <i class="fas fa-terminal mr-2"></i> Execute Copy
            </button>

            <div class="space-y-4 text-[11px]">
                <div class="contact-item">
                    <p class="text-gray-500">// MARKETPLACE</p>
                    <a href="https://devnvios.io.vn" target="_blank">HTTP://DEVNVIOS.IO.VN</a>
                </div>
                <div class="contact-item">
                    <p class="text-gray-500">// ENCRYPTED GROUP</p>
                    <a href="https://t.me/crackpythonva" target="_blank">T.ME/CRACKPYTHONVA</a>
                </div>
                <div class="contact-item">
                    <p class="text-gray-500">// ADMIN ROOT</p>
                    <a href="https://t.me/iosnea" target="_blank">TELEGRAM: @IOSNEA</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqT2JLwKVgAop_i98W5YsHrkqMWyVjszgfGww4quRb_iN27EkLZv8_rr_2gIYk9wBT/exec";

        async function fetchTerminal() {
            const local = localStorage.getItem('access_token');
            if (local) {
                document.getElementById('display').innerText = local;
            } else {
                try {
                    const res = await fetch(SCRIPT_URL);
                    const key = await res.text();
                    const clean = key.trim();
                    if(clean && clean !== "HẾT KEY RỒI!") {
                        document.getElementById('display').innerText = clean;
                        localStorage.setItem('access_token', clean);
                    } else {
                        document.getElementById('display').innerText = "NULL DATA";
                    }
                } catch (e) {
                    document.getElementById('display').innerText = "CONNECT_ERROR";
                }
            }
        }

        function copyAndDestroy() {
            const key = document.getElementById('display').innerText;
            if (key.includes("@") || key.includes("NULL") || key.includes("_")) return;

            navigator.clipboard.writeText(key).then(() => {
                // THÔNG BÁO KIỂU CẢNH BÁO MÁY TÍNH
                alert(" [ SECURITY ALERT ] \n\n - Đã sao chép mã khóa vào bộ nhớ tạm.\n - KHÔNG CHIA SẺ KEY NÀY CHO BẤT KỲ AI.\n - Nếu phát hiện chia sẻ, hệ thống sẽ tự động BAN thiết bị.");

                // XÓA KEY KHỎI MÁY NGAY
                localStorage.removeItem('access_token');
                document.getElementById('display').innerText = "SUCCESS_EXECUTED";
                
                setTimeout(() => { location.reload(); }, 1500);
            });
        }

        fetchTerminal();
    </script>
</body>
    </html>
