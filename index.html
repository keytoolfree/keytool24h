<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lấy Key Free - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* Hiệu ứng khung 7 màu đổi màu siêu nhanh */
        .rgb-border {
            padding: 5px;
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            border-radius: 20px;
            animation: rgb-run 1.2s linear infinite;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        @keyframes rgb-run {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .main-card {
            background: #111;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        .key-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            color: #00ff00;
            font-family: 'Consolas', monospace;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #00ff00;
        }

        .btn-copy {
            background: linear-gradient(to right, #ff0000, #ff7300);
            animation: pulse 1s infinite;
            transition: 0.2s;
            font-weight: 900;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .btn-copy:active { transform: scale(0.9); }

        #toast {
            visibility: hidden; min-width: 280px; background-color: #00ff00; color: #000;
            text-align: center; border-radius: 10px; padding: 15px; position: fixed;
            z-index: 100; left: 50%; bottom: 40px; transform: translateX(-50%);
            font-weight: bold; font-size: 13px; box-shadow: 0 0 20px #00ff00;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 40px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 40px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="rgb-border">
        <div class="main-card">
            <h1 class="text-2xl font-black italic mb-6 tracking-tighter uppercase">Get Key Free</h1>
            
            <div id="key-display" class="key-box p-4 rounded-xl mb-6 break-all">
                ĐANG QUÉT KEY...
            </div>

            <button onclick="copyKey()" class="btn-copy w-full py-4 rounded-xl text-white text-lg mb-6 shadow-lg">
                <i class="fas fa-copy mr-2"></i> SAO CHÉP KEY
            </button>

            <div class="text-[12px] text-gray-400 text-left space-y-3 border-t border-gray-800 pt-4">
                <p><i class="fas fa-check-circle text-green-500 mr-1"></i> Sau khi sao chép hãy dán vào trang web chính.</p>
                <p><i class="fas fa-history text-blue-500 mr-1"></i> Key sẽ tự động biến mất và cập nhật key mới cho người sau.</p>
                <p class="text-center font-bold">MUA KEY VIP LIÊN HỆ TELE: 
                    <a href="https://t.me/iosnea" target="_blank" class="text-blue-400 underline">@iosnea</a>
                </p>
            </div>
        </div>
    </div>

    <div id="toast">ĐÃ SAO CHÉP! HÃY DÁN VÀO TRANG WEB CHÍNH</div>

    <script>
        // QUAN TRỌNG: Dán link Web App từ Google Sheets của bạn vào đây
        const SCRIPT_URL = "DÁN_LINK_GOOGLE_APPS_SCRIPT_CỦA_BẠN_VÀO_ĐÂY";

        async function fetchKey() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.text();
                document.getElementById('key-display').innerText = data;
            } catch (e) {
                document.getElementById('key-display').innerText = "LỖI KẾT NỐI!";
            }
        }

        function copyKey() {
            const key = document.getElementById('key-display').innerText;
            if (key === "ĐANG QUÉT KEY..." || key === "HẾT KEY RỒI!" || key === "LỖI KẾT NỐI!") return;

            navigator.clipboard.writeText(key).then(() => {
                const toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);

                document.getElementById('key-display').style.opacity = "0.1";
                
                // Tự động load lại để "đốt" key cũ và hiện key mới sau 2 giây
                setTimeout(() => {
                    location.reload();
                }, 2000);
            });
        }
        fetchKey();
    </script>
</body>
</html>
