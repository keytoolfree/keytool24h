<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE SYSTEM - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');
        body { background: #000; color: #ff0000; font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .terminal-box { border: 2px solid #ff0000; background: #050505; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); text-align: center; position: relative; }
        #key-box { background: #000; border: 1px solid #ff0000; color: #fff; padding: 30px; margin: 20px 0; min-height: 120px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .btn-action { background: #ff0000; color: #000; width: 100%; padding: 18px; font-weight: 900; cursor: pointer; border: none; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: 0.3s; text-transform: uppercase; display: block; }
        .btn-action:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        .link-new { color: #00fbff; text-decoration: underline; font-size: 14px; font-weight: bold; }
        .hidden { display: none !important; }
        #timer { font-size: 1.5rem; color: #ff0000; text-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div class="flex justify-between text-[10px] mb-4 text-gray-500">
            <span>[ HWID_ENCRYPT_ACTIVE ]</span>
            <span id="device-tag">SCANNING...</span>
        </div>

        <h1 class="text-xl mb-6 font-black italic tracking-tighter">SECURE AUTHORIZATION</h1>

        <div id="key-box">
            <span class="animate-pulse">ĐANG KIỂM TRA THIẾT BỊ...</span>
        </div>

        <div id="btn-area">
            <button id="copy-btn" onclick="handleCopy()" class="btn-action hidden">SAO CHÉP KEY</button>
            
            <a id="get-link-btn" href="https://link4m.net/40p7513R" target="_blank" class="btn-action hidden">BẤM VÀO ĐÂY ĐỂ LẤY KEY MỚI</a>
        </div>

        <div id="vip-area" class="mt-6 p-3 border border-red-900 bg-red-950/20">
            <p class="text-[10px] text-gray-400">Nếu mua <span class="text-white">KEY VIP</span> bạn có thể sử dụng những tool đẳng cấp nhất Việt Nam tại <a href="https://devnvios.io.vn" class="text-blue-500 underline font-bold">devnvios.io.vn</a></p>
        </div>

        <div class="mt-6 text-[9px] text-gray-700">© DEVNVIOS SYSTEM | ADMIN @IOSNEA</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqT2JLwKVgAop_i98W5YsHrkqMWyVjszgfGww4quRb_iN27EkLZv8_rr_2gIYk9wBT/exec";
        const WAIT_TIME = 24 * 60 * 60 * 1000;

        async function init() {
            // 1. Lấy Fingerprint để lưu thiết bị cho cứng
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            const deviceId = result.visitorId;
            document.getElementById('device-tag').innerText = "DEVICE_ID: " + deviceId.substring(0,8).toUpperCase();

            const display = document.getElementById('key-box');
            const copyBtn = document.getElementById('copy-btn');
            const getLinkBtn = document.getElementById('get-link-btn');

            // 2. Kiểm tra xem thiết bị này có đang bị khóa 24h không
            const lockTime = localStorage.getItem('lock_' + deviceId);
            const now = new Date().getTime();

            if (lockTime && now < lockTime) {
                // ĐANG TRONG THỜI GIAN KHÓA 24H -> Bắt vượt link tiếp để lấy key mới
                display.innerHTML = `<div>
                    <p class="text-[10px] text-red-500 font-bold mb-2">THIẾT BỊ ĐÃ HẾT PHIÊN LÀM VIỆC</p>
                    <p class="text-[11px] text-gray-400">Vui lòng vượt link để nhận mã mới</p>
                </div>`;
                getLinkBtn.classList.remove('hidden');
                copyBtn.classList.add('hidden');
            } else {
                // CHƯA KHÓA HOẶC HẾT 24H -> Cho phép lấy key
                try {
                    const res = await fetch(SCRIPT_URL);
                    const key = await res.text();
                    const cleanKey = key.trim();

                    if(cleanKey && cleanKey !== "HẾT KEY RỒI!") {
                        display.innerText = cleanKey;
                        copyBtn.classList.remove('hidden');
                    } else {
                        display.innerText = "HỆ THỐNG ĐANG BẢO TRÌ";
                    }
                } catch (e) {
                    display.innerText = "LỖI KẾT NỐI SERVER";
                }
            }
        }

        function handleCopy() {
            const display = document.getElementById('key-box');
            const keyText = display.innerText;
            if (keyText.length < 5 || keyText.includes("...")) return;

            // Lấy ID thiết bị để khóa
            FingerprintJS.load().then(fp => fp.get()).then(result => {
                const deviceId = result.visitorId;

                navigator.clipboard.writeText(keyText).then(() => {
                    alert(" [ SECURITY ALERT ] \n\n - ĐÃ SAO CHÉP KEY.\n - THIẾT BỊ NÀY ĐÃ ĐƯỢC LƯU VÀO HỆ THỐNG.\n - SAU 24 GIỜ VUI LÒNG VƯỢT LINK LẠI ĐỂ LẤY KEY MỚI.");

                    // KHÓA THIẾT BỊ TRONG 24H
                    localStorage.setItem('lock_' + deviceId, new Date().getTime() + WAIT_TIME);

                    // MÃ HÓA NGAY LẬP TỨC
                    display.innerHTML = `<span class="text-red-600 font-bold text-xs uppercase">Key đã mã hóa & Đã lưu thiết bị.</span>`;
                    document.getElementById('copy-btn').classList.add('hidden');
                    
                    // Hiện nút bắt vượt link cho lần sau
                    setTimeout(() => { location.reload(); }, 2000);
                });
            });
        }

        init();
    </script>
</body>
</html>
