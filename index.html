<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET KEY FREE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #0f0; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px #0f0; background: rgba(0,0,0,0.9); max-width: 90%; }
        .key-box { background: #111; border: 1px dashed #0f0; padding: 15px; margin: 20px 0; font-size: 1.2rem; word-break: break-all; min-height: 50px; }
        button { background: #0f0; color: #000; font-weight: bold; padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #0c0; box-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #fff; margin-bottom: 10px;">HỆ THỐNG LẤY KEY TỰ ĐỘNG</h2>
        <p style="font-size: 0.8rem;">Vui lòng đợi trong giây lát...</p>
        
        <div id="key-display" class="key-box">ĐANG TẢI KEY...</div>
        
        <button onclick="copyKey()">SAO CHÉP KEY</button>
        <p style="margin-top: 15px; font-size: 0.7rem; color: #888;">Sau khi copy, hãy quay lại web chính để kích hoạt.</p>
    </div>

    <script>
        // LINK SCRIPT GOOGLE SHEETS CỦA BẠN
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqT2JLwKVgAop_i98W5YsHrkqMWyVjszgfGww4quRb_iN27EkLZv8_rr_2gIYk9wBT/exec";

        async function fetchKey() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.text();
                document.getElementById('key-display').innerText = data.trim();
            } catch (error) {
                document.getElementById('key-display').innerText = "LỖI: KHÔNG LẤY ĐƯỢC KEY!";
            }
        }

        function copyKey() {
            const keyText = document.getElementById('key-display').innerText;
            if(keyText && keyText !== "ĐANG TẢI KEY..." && keyText !== "LỖI: KHÔNG LẤY ĐƯỢC KEY!") {
                navigator.clipboard.writeText(keyText).then(() => {
                    alert("Đã sao chép: " + keyText);
                    // Reload để lấy key mới (Google Script sẽ tự xóa dòng cũ)
                    location.reload();
                });
            } else {
                alert("Chưa có key để copy!");
            }
        }

        // Tự động chạy khi mở trang
        fetchKey();
    </script>
</body>
</html>
