<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ACCESS - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap');
        body { background: #000; color: #ff0000; font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal-box { border: 2px solid #ff0000; background: #050505; padding: 40px; width: 100%; max-width: 550px; position: relative; box-shadow: 0 0 40px rgba(255, 0, 0, 0.4); }
        #key-box { background: #000; border: 1px solid #ff0000; color: #fff; padding: 30px; text-align: center; font-size: 1.1rem; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.2); }
        .btn-copy { background: #ff0000; color: #000; width: 100%; padding: 20px; font-weight: 900; letter-spacing: 2px; cursor: pointer; border: none; clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: 0.3s; }
        .btn-copy:hover { background: #fff; box-shadow: 0 0 25px #fff; }
        .error-msg { color: #ff0000; font-size: 12px; font-weight: bold; text-align: center; border: 1px dashed #ff0000; padding: 10px; margin-bottom: 20px; }
        .vip-promo { background: rgba(255,0,0,0.1); padding: 15px; margin-top: 20px; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div class="flex justify-between text-[10px] mb-6">
            <span>[ PROTOCOL: ANTI-VPN ]</span>
            <span id="device-id" class="text-white">ID: SCANNIG...</span>
        </div>

        <div id="status-area"></div>

        <div id="key-box">
            <span class="animate-pulse">ĐANG KIỂM TRA HỆ THỐNG...</span>
        </div>

        <div id="action-area">
            <button onclick="handleCopy()" class="btn-copy">EXECUTE COPY</button>
        </div>

        <div id="vip-area" class="hidden">
            <div class="vip-promo">
                <p class="text-[11px] text-gray-300">Mua <span class="text-red-500 font-bold">KEY VIP</span> để bỏ qua tất cả các bước xác minh và sử dụng tool đẳng cấp tại <br><a href="https://devnvios.io.vn" class="text-blue-500 font-bold underline">devnvios.io.vn</a></p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqT2JLwKVgAop_i98W5YsHrkqMWyVjszgfGww4quRb_iN27EkLZv8_rr_2gIYk9wBT/exec";
        const COOLDOWN = 24 * 60 * 60 * 1000;

        async function checkSecurity() {
            // 1. Kiểm tra VPN qua Múi giờ (VPN thường đổi IP nhưng quên đổi Timezone máy)
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            if (timezone !== "Asia/Ho_Chi_Minh") {
                return { error: "CẢNH BÁO: PHÁT HIỆN VPN/PROXY. VUI LÒNG TẮT VPN VÀ TẢI LẠI TRANG!" };
            }

            // 2. Lấy Fingerprint (Dấu vân tay thiết bị)
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            const visitorId = result.visitorId;
            document.getElementById('device-id').innerText = "ID: " + visitorId.substring(0, 10).toUpperCase();

            return { id: visitorId };
        }

        async function init() {
            const security = await checkSecurity();
            const display = document.getElementById('key-box');
            
            if (security.error) {
                display.innerHTML = `<span class="text-red-600 font-bold">${security.error}</span>`;
                document.getElementById('action-area').innerHTML = "";
                return;
            }

            const lock = localStorage.getItem('device_lock');
            if (lock && new Date().getTime() < lock) {
                display.innerHTML = `<div class="text-center"><p class="text-[10px] text-gray-500 uppercase">Thiết bị đã bị khóa 24h</p><p class="text-red-600 text-sm">VUI LÒNG QUAY LẠI SAU</p></div>`;
                document.getElementById('action-area').classList.add('hidden');
                document.getElementById('vip-area').classList.remove('hidden');
                return;
            }

            try {
                const res = await fetch(SCRIPT_URL);
                const key = await res.text();
                display.innerText = key.trim();
            } catch {
                display.innerText = "SERVER_ERROR";
            }
        }

        function handleCopy() {
            const box = document.getElementById('key-box');
            const keyText = box.innerText;
            if (keyText.length < 5 || keyText.includes("VPN")) return;

            navigator.clipboard.writeText(keyText).then(() => {
                alert(" [ THÔNG BÁO HỆ THỐNG ] \n\n - ĐÃ SAO CHÉP KEY.\n - THIẾT BỊ CỦA BẠN ĐÃ ĐƯỢC LƯU LẠI.\n - HỆ THỐNG SẼ KHÓA TRONG 24 GIỜ TIẾP THEO.");

                // Khóa cứng thiết bị này
                localStorage.setItem('device_lock', new Date().getTime() + COOLDOWN);
                
                // Mã hóa box
                box.innerHTML = `<span class="text-gray-600 text-[12px]">DỮ LIỆU ĐÃ MÃ HÓA. LIÊN HỆ ADMIN ĐỂ HỖ TRỢ.</span>`;
                
                setTimeout(() => { location.reload(); }, 2000);
            });
        }

        init();
    </script>
</body>
</html>
