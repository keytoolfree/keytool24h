$time_left = 0;
$user_key_type = "Thành viên";

if($is_logged_in){
    $u = $_SESSION['username'];
    $user_q = mysqli_fetch_assoc(mysqli_query($conn, "SELECT role, key_type, expiry_date FROM users WHERE username = '$u'"));
    if(($user_q['role'] ?? 0) == 1) $is_admin = true;
    
    $user_key_type_raw = $user_q['key_type'] ?? 'NONE';
    if($user_key_type_raw == 'FREE') $user_key_type = "Free";
    if($user_key_type_raw == 'VIP') $user_key_type = "Vip";
    
    if(!empty($user_q['expiry_date'])) {
        $expiry = strtotime($user_q['expiry_date']);
        $now = time();
        $time_left = $expiry - $now;
        if($time_left < 0) $time_left = 0;
    }
}

// Xử lý nạp key
if ($_SERVER['REQUEST_METHOD'] == 'POST') {
    if (!$is_logged_in) { header("Location: ?status=not_logged_in"); exit(); }
    $status = "key_wrong";
    $u = $_SESSION['username'];
    
    if (isset($_POST['submit_vip'])) {
        $key_vip = mysqli_real_escape_string($conn, $_POST['key_vip']);
        $check = mysqli_query($conn, "SELECT * FROM keys_vip WHERE key_code = '$key_vip' AND status = 0 LIMIT 1");
        if ($row = mysqli_fetch_assoc($check)) {
            $hr = $row['duration_hours'];
            mysqli_query($conn, "UPDATE keys_vip SET status = 1 WHERE key_code = '$key_vip'");
            mysqli_query($conn, "UPDATE users SET key_type = 'VIP', expiry_date = DATE_ADD(NOW(), INTERVAL $hr HOUR) WHERE username = '$u'");
            $status = "success";
        }
    } 
    elseif (isset($_POST['submit_free'])) {
        $key_free = mysqli_real_escape_string($conn, $_POST['key_free']);
        $check = mysqli_query($conn, "SELECT * FROM keys_free WHERE key_code = '$key_free' AND status = 0 LIMIT 1");
        if ($row = mysqli_fetch_assoc($check)) {
            $hr = $row['duration_hours'] ?? 24;
            mysqli_query($conn, "UPDATE keys_free SET status = 1 WHERE key_code = '$key_free'");
            mysqli_query($conn, "UPDATE users SET key_type = 'FREE', expiry_date = DATE_ADD(NOW(), INTERVAL $hr HOUR) WHERE username = '$u'");
            $status = "success";
        }
    }
    header("Location: ?status=" . $status);
    exit();
}
$status_msg = $_GET['status'] ?? "";

    <script>
        // Timer đếm ngược
        let timeLeft = <?php echo $time_left; ?>;
        function updateTimer() {
            const display = document.getElementById('timer');
            if(!display || timeLeft <= 0) return;
            let h = Math.floor(timeLeft / 3600), m = Math.floor((timeLeft % 3600) / 60), s = timeLeft % 60;
            display.innerHTML = (h<10?'0':'')+h + ":" + (m<10?'0':'')+m + ":" + (s<10?'0':'')+s;
            timeLeft--;
        }
        if(timeLeft > 0) { setInterval(updateTimer, 1000); updateTimer(); }
        
        // Xóa tham số status trên URL sau 3 giây
        setTimeout(() => {
            window.history.replaceState(null, null, window.location.pathname);
