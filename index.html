<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ACCESS - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .terminal { border: 1px solid #ff0000; padding: 30px; background: #050505; width: 400px; box-shadow: 0 0 15px rgba(255,0,0,0.5); text-align: center; }
        input { background: #000; border: 1px solid #ff0000; color: #fff; width: 100%; padding: 12px; text-align: center; margin: 20px 0; outline: none; }
        .btn-exec { background: #ff0000; color: #000; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-get { display: block; margin-top: 15px; color: #fff; font-size: 11px; text-decoration: underline; opacity: 0.7; }
        .btn-get:hover { opacity: 1; color: #ff0000; }
        #result { margin-top: 20px; color: #00ff00; font-weight: bold; min-height: 40px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="terminal">
        <div style="font-size: 12px;">[ SYSTEM VERIFICATION ]</div>
        
        <input type="text" id="tokenInput" placeholder="DÁN MÃ TOKEN VÀO ĐÂY...">
        
        <button onclick="verify()" id="execBtn" class="btn-exec">XÁC MINH NGAY</button>
        
        <div id="result">CHỜ NHẬP MÃ...</div>

        <a href="get-token.html" target="_blank" class="btn-get">BẤM VÀO ĐÂY ĐỂ LẤY MÃ (TOKEN)</a>
    </div>

    <script>
        const API_URL = "URL_WEB_APP_GOOGLE_SCRIPT_CỦA_BẠN";

        async function verify() {
            const token = document.getElementById('tokenInput').value;
            const resBox = document.getElementById('result');
            if(!token) return alert("Bạn chưa nhập mã Token!");

            resBox.innerText = "ĐANG KIỂM TRA...";
            try {
                const res = await fetch(`${API_URL}?action=verify&token=${token}`);
                const data = await res.text();
                
                if(data.includes("DEV-")) {
                    resBox.innerHTML = `KEY CỦA BẠN:<br><span style="color:#fff; font-size:18px;">${data}</span>`;
                } else {
                    resBox.innerText = data;
                    resBox.style.color = "red";
                }
            } catch (e) {
                resBox.innerText = "LỖI KẾT NỐI SERVER!";
            }
        }
    </script>
</body>
</html>
