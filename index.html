<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>TERMINAL - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin:0; }
        .terminal { border: 1px solid #ff0000; padding: 30px; background: #050505; width: 450px; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        input { background: #000; border: 1px solid #ff0000; color: #fff; width: 100%; padding: 10px; text-align: center; margin-bottom: 20px; outline: none; }
        .btn-exec { background: #ff0000; color: #000; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border: none; }
        #result-box { margin-top: 20px; padding: 15px; border: 1px solid #333; min-height: 50px; text-align: center; word-break: break-all; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>
    <div class="terminal">
        <div style="font-size: 10px; margin-bottom: 20px;">[ SYSTEM VERIFICATION ]</div>
        <input type="text" id="tokenInput" placeholder="DÁN MÃ XÁC THỰC VÀO ĐÂY...">
        <button onclick="verify()" id="btn" class="btn-exec">EXECUTE VERIFY</button>
        <div id="result-box">CHỜ XÁC MINH...</div>
        <div style="margin-top: 20px; font-size: 10px;">
            <a href="LINK_RUT_GON_CUA_BAN" style="color:#fff; text-decoration: underline;">Chưa có mã? Vượt link lấy mã tại đây</a>
        </div>
    </div>

    <script>
        const API = "URL_WEB_APP_CỦA_BẠN"; // Dán link Apps Script vào đây

        async function verify() {
            const val = document.getElementById('tokenInput').value;
            const resBox = document.getElementById('result-box');
            if(!val) return alert("Nhập mã đi bạn ơi!");

            resBox.innerText = "ĐANG KIỂM TRA...";
            try {
                const res = await fetch(`${API}?action=verify&token=${val}`);
                const key = await res.text();
                
                if(key.includes("DEV-")) {
                    resBox.innerHTML = `KEY CỦA BẠN:<br><span style="color:#fff; font-size:18px">${key}</span>`;
                    alert("XÁC MINH THÀNH CÔNG!");
                } else {
                    resBox.innerText = key;
                    resBox.style.color = "red";
                }
            } catch (e) { resBox.innerText = "LỖI SERVER!"; }
        }
    </script>
</body>
</html>
