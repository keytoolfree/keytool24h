<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TOKEN GENERATOR - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { border: 1px solid #ff0000; padding: 40px; background: #050505; text-align: center; width: 400px; box-shadow: 0 0 25px rgba(255,0,0,0.4); }
        #token-display { font-size: 24px; color: #fff; margin: 25px 0; padding: 20px; border: 1px dashed #ff0000; background: #111; letter-spacing: 3px; }
        .btn-copy { background: #fff; color: #000; width: 100%; padding: 14px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .btn-copy:hover:not(:disabled) { background: #ff0000; color: #fff; }
        .btn-copy:disabled { background: #222; color: #444; cursor: not-allowed; }
        .error-msg { color: #ff0000; border: 2px solid #ff0000; padding: 20px; background: #1a0000; }
    </style>
</head>
<body>
    <div id="secure-zone" class="box hidden">
        <div style="font-size: 11px; margin-bottom: 10px;">[ ACCESS GRANTED ]</div>
        <p style="font-size: 12px; color: #555;">MÃ TOKEN CỦA BẠN LÀ:</p>
        <div id="token-display">********</div>
        <button onclick="copyToken()" id="copyBtn" class="btn-copy" disabled>SAO CHÉP MÃ</button>
        <p style="font-size: 10px; color: #444; margin-top: 25px;">SAO CHÉP VÀ QUAY LẠI TRANG CHỦ ĐỂ NHẬN KEY</p>
    </div>

    <div id="error-zone" class="error-msg hidden">
        <h2 style="font-weight: bold;">TRUY CẬP BỊ TỪ CHỐI</h2>
        <p style="font-size: 12px; margin-top: 10px;">Bạn phải vượt link từ Link4M mới có thể lấy mã!</p>
        <a href="https://link4m.net/40p7513R" style="display: block; margin-top: 15px; color: #fff; text-decoration: underline;">Click để vượt link lại</a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbymLRM2XANAGkaOy1MG1oBuaQKzKYR92tmjHyiph92uTvQKV56sJ2RvPL0AGflVMVs/exec";
        const SECRET = "DEVNVIOS_PRO_2026";

        async function init() {
            const ref = document.referrer;
            // Kiểm tra nguồn từ Link4M (hỗ trợ cả .net và .com)
            if (!ref.includes("link4m.net") && !ref.includes("link4m.com")) {
                document.getElementById('error-zone').classList.remove('hidden');
                return;
            }

            document.getElementById('secure-zone').classList.remove('hidden');
            const display = document.getElementById('token-display');

            try {
                // Lấy IP để giới hạn 24h
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const deviceID = navigator.userAgent.length + "-" + screen.width;

                const res = await fetch(`${API_URL}?action=generate&secret=${SECRET}&ip=${ipData.ip}&device=${deviceID}`);
                const token = await res.text();
                
                display.innerText = token;
                if (!token.includes("LỖI")) {
                    document.getElementById('copyBtn').disabled = false;
                } else {
                    display.style.fontSize = "14px";
                    display.style.color = "yellow";
                }
            } catch (e) {
                display.innerText = "LỖI SERVER!";
            }
        }

        function copyToken() {
            const t = document.getElementById('token-display').innerText;
            navigator.clipboard.writeText(t).then(() => {
                alert("Đã sao chép Token!");
            });
        }
        init();
    </script>
</body>
</html>
