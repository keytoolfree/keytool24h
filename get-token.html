<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GET TOKEN - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { border: 1px solid #ff0000; padding: 40px; background: #050505; text-align: center; width: 350px; }
        #token-display { font-size: 20px; color: #fff; margin: 20px 0; padding: 10px; border: 1px dashed #ff0000; min-height: 40px; }
        .btn-copy { background: #fff; color: #000; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 10px;">[ YOUR ACCESS TOKEN ]</div>
        <div id="token-display">ĐANG TẠO...</div>
        <button onclick="copyToken()" id="copyBtn" class="btn-copy" disabled>SAO CHÉP MÃ</button>
        <p style="font-size: 10px; color: #555; margin-top: 20px;">Quay lại trang chủ và dán mã này vào.</p>
    </div>

    <script>
        const API_URL = "URL_WEB_APP_GOOGLE_SCRIPT_CỦA_BẠN";
        const SECRET = "DEVNVIOS_PRO_2026";

        async function generate() {
            try {
                const res = await fetch(`${API_URL}?action=generate&secret=${SECRET}`);
                const token = await res.text();
                document.getElementById('token-display').innerText = token;
                document.getElementById('copyBtn').disabled = false;
            } catch (e) {
                document.getElementById('token-display').innerText = "LỖI SERVER!";
            }
        }

        function copyToken() {
            const t = document.getElementById('token-display').innerText;
            navigator.clipboard.writeText(t);
            alert("Đã sao chép Token thành công!");
            window.close(); // Tùy chọn: Đóng tab này sau khi copy
        }
        
        generate();
    </script>
</body>
</html>
