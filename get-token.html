<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><title>GET TOKEN - DEVNVIOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin:0; }
        .box { border: 2px solid #ff0000; padding: 40px; text-align: center; box-shadow: 0 0 20px #ff0000; background: #050505; max-width: 400px; width: 90%; }
        .token-display { font-size: 1.5rem; font-weight: bold; color: #fff; margin: 20px 0; border: 1px dashed #ff0000; padding: 10px; }
        .btn { background: #ff0000; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; width: 100%; border: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="font-size: 10px;">[ TOKEN GENERATOR ]</h2>
        <div id="display" class="token-display">ĐANG TẠO MÃ...</div>
        <button id="btn" onclick="copy()" class="btn" disabled>SAO CHÉP MÃ</button>
        <p style="font-size: 9px; margin-top: 15px; color: #555;">Dán mã này vào trang chủ để nhận Key VIP</p>
    </div>

    <script>
        const API = "URL_WEB_APP_CỦA_BẠN"; // Dán link Apps Script vào đây
        const SECRET = "DEVNVIOS_PRO_2026";

        async function init() {
            try {
                const res = await fetch(`${API}?action=generate&secret=${SECRET}`);
                const token = await res.text();
                document.getElementById('display').innerText = token;
                document.getElementById('btn').disabled = false;
            } catch (e) { document.getElementById('display').innerText = "LỖI KẾT NỐI!"; }
        }
        function copy() {
            navigator.clipboard.writeText(document.getElementById('display').innerText);
            alert("Đã copy mã xác thực!");
        }
        init();
    </script>
</body>
</html>
